name: CI

# CI runs on every PR and push to main. It gates new code against the
# Go-community standards via `golangci-lint --new-from-rev=origin/main`.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: build, lint, test
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for --new-from-rev

      - name: set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic

      # Nested modules (examples, interop codecs, QUIC transport, config,
      # otel) have their own go.mod and are not covered by the root ./...
      # patterns, so build+test them explicitly.
      - name: nested module — cmd (examples)
        run: |
          cd cmd
          go build ./...
          go test ./... -race

      - name: nested module — codec/protobuf
        run: |
          cd pkg/codec/protobuf
          go build ./...
          go test ./... -race

      - name: nested module — transport/quic
        run: |
          cd pkg/transport/quic
          go build ./...
          go test ./... -race

      - name: nested module — config
        run: |
          cd pkg/config
          go build ./...
          go test ./... -race

      - name: nested module — otel
        run: |
          cd pkg/otel
          go build ./...
          go test ./... -race

      # Catch regressions in test coverage. The threshold is intentionally
      # below current to leave headroom for refactors; raise it as the
      # suite grows. Covers the root (library) module only; example
      # binaries live in the cmd module.
      - name: coverage threshold
        run: |
          threshold=60
          coverage=$(go tool cover -func=coverage.out | tail -1 | awk '{print int($3)}')
          if [ "$coverage" -lt "$threshold" ]; then
            echo "::error::coverage ${coverage}% is below threshold ${threshold}%"
            exit 1
          fi
          echo "coverage ${coverage}% >= threshold ${threshold}%"

      - name: install golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0

      # Gate new code against the Go-community standards. Pre-existing
      # violations are not blocking — only regressions and new violations
      # fail CI.
      - name: lint new code
        run: golangci-lint run --new-from-rev=origin/main ./...

      - name: vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: vulnerability scan — cmd
        run: cd cmd && go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: vulnerability scan — codec/protobuf
        run: cd pkg/codec/protobuf && go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: vulnerability scan — transport/quic
        run: cd pkg/transport/quic && go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: vulnerability scan — config
        run: cd pkg/config && go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: vulnerability scan — otel
        run: cd pkg/otel && go run golang.org/x/vuln/cmd/govulncheck@latest ./...
